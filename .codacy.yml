---
exclude_paths:
  - "External/**"
  - "**/DroneShow_Test/**"
  - "**/*Test.cpp"
  - "**/*.config"

engines:
  duplication:
    exclude_paths:
      - "External/**"
      - "**/DroneShow_Test/**"
      - "**/*Test.cpp"

  cppcheck:
    enabled: true
    params:
      - name: suppress
        value: missingIncludeSystem

  trivy:
    enabled: false

languages:
  - Cpp
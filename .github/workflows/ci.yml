name: C++ CI (MSBuild)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup NuGet
      uses: nuget/setup-nuget@fd55a6f3b34392fa83fde1454582407d8c714123 # v4.0.0

    - name: Restore NuGet Packages
      run: nuget restore ECSDroneShow.sln

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build the solution
      run: msbuild ECSDroneShow.sln /p:Configuration=Release /p:Platform=x64

    - name: Run Unit Tests
      run: .\x64\Release\DroneShow_Test.exe
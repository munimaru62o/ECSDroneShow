name: Build and Analyze

on:
  push:
    branches:
    - "main"
    - "dev"
    - "develop"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "THIRD_PARTY_LICENSES"

  pull_request:
    branches:
    - "main"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "THIRD_PARTY_LICENSES"

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup NuGet
      uses: nuget/setup-nuget@fd55a6f3b34392fa83fde1454582407d8c714123 # v4.0.0

    - name: Restore NuGet Packages
      run: nuget restore ECSDroneShow.sln

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

    - name: Build the solution
      run: msbuild ECSDroneShow.sln /p:Configuration=Release /p:Platform=x64

    - name: Install OpenCppCoverage
      run: choco install opencppcoverage -y
    
    - name: Run Unit Tests with Coverage
      run: |
        & "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe" --export_type cobertura:coverage.xml --sources "${{ github.workspace }}" -- .\x64\Release\DroneShow_Test.exe
      shell: powershell

    - name: Upload Coverage Report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-report
        path: coverage.xml

  code-analytics:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download Coverage Report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report

      - name: Fix coverage paths for Linux
        run: |
          # 1. Convert Windows backslashes to Linux forward slashes
          sed -i 's/\\/\//g' coverage.xml
          
          # 2. Map the "a/ECSDroneShow/..." path prefix directly to the Linux workspace absolute path
          # This ensures the filename attribute matches the absolute path used by SonarQube on Linux
          LINUX_WORKSPACE="${{ github.workspace }}"
          sed -i "s|filename=\"a/ECSDroneShow/ECSDroneShow/|filename=\"$LINUX_WORKSPACE/|g" coverage.xml
          
          # 3. Clean up Windows-specific absolute paths from package names to avoid confusion
          sed -i "s|D:/a/ECSDroneShow/ECSDroneShow/||g" coverage.xml

      - name: Upload Corrected Coverage Report for Debug
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-coverage-xml
          path: coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.cobertura.reportPaths=coverage.xml

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}